name: Release

# Cut a release by pushing a tag, e.g.:  git tag v0.1.1 && git push github v0.1.1
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # create the release + upload assets

jobs:
  # Linux: build on an OLDER runner (glibc 2.35) using the system Python 3.10, which
  # ships a *shared* libpython that PyInstaller requires. Result runs on Debian 12+ /
  # Ubuntu 22.04+. (ubuntu-latest=24.04 links GLIBC_2.38, which Debian 12 lacks;
  # manylinux's bundled Python is static-only, so PyInstaller can't use it either.)
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build engine + one-file bundle
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-venv python3-dev
          /usr/bin/python3 -m venv /tmp/venv         # system 3.10 -> shared libpython @ glibc 2.35
          . /tmp/venv/bin/activate
          python -m pip install --upgrade pip
          pip install pyyaml openai pyinstaller
          make CFLAGS="-DADVENT_AUTOSAVE -DADVENT_NO_EDITLINE" LIBS=
          pyinstaller --onefile --name cavebridge --noconfirm \
            --add-data "adventure.yaml:." \
            --add-binary "advent:." \
            --collect-all openai --paths . \
            packaging/cavebridge_entry.py
          mkdir -p out && cp dist/cavebridge out/cavebridge-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: cavebridge-linux-x86_64
          path: out/*

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          # Static body, REPLACED (not appended) on each call, so the three build
          # jobs don't each tack on their own "Full Changelog" line.
          append_body: false
          body: |
            Self-contained builds — download the file for your platform and run it.
            On first launch CaveBridge sets up your LLM connection (or set the
            `OPENAI_*` env vars). See the README to get started.

  # macOS (arm64) + Windows: one-file bundles on their native runners.
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: cavebridge-macos-arm64
          - os: windows-latest
            asset: cavebridge-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python deps (front-end + bundler)
        run: pip install pyyaml openai pyinstaller

      # ---- macOS: libedit-free engine, then a one-file bundle ----
      - name: Build engine + bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          make CFLAGS="-DADVENT_AUTOSAVE -DADVENT_NO_EDITLINE" LIBS=
          pyinstaller --onefile --name cavebridge --noconfirm \
            --add-data "adventure.yaml:." \
            --add-binary "advent:." \
            --collect-all openai --paths . \
            packaging/cavebridge_entry.py

      # ---- Windows: native advent.exe via MSYS2/mingw-w64, then bundle ----
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-yaml

      - name: Build engine (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          make CFLAGS="-DADVENT_AUTOSAVE -DADVENT_NO_EDITLINE" LIBS=
          test -f advent.exe || cp advent advent.exe

      - name: Build bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --onefile --name cavebridge --noconfirm `
            --add-data "adventure.yaml;." `
            --add-binary "advent.exe;." `
            --collect-all openai --paths . `
            packaging/cavebridge_entry.py

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/cavebridge.exe "out/${{ matrix.asset }}.exe"
          else
            cp dist/cavebridge "out/${{ matrix.asset }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/*

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          # Static body, REPLACED (not appended) on each call, so the three build
          # jobs don't each tack on their own "Full Changelog" line.
          append_body: false
          body: |
            Self-contained builds — download the file for your platform and run it.
            On first launch CaveBridge sets up your LLM connection (or set the
            `OPENAI_*` env vars). See the README to get started.
