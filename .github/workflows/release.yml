name: Release

# Cut a release by pushing a tag, e.g.:  git tag v0.1.2 && git push github v0.1.2
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # create the release + upload assets

# Reusable release body (kept identical across jobs and REPLACED, not appended, so
# the build jobs don't each tack on their own "Full Changelog" line).
# Note: each job redefines this inline because YAML anchors aren't shared across jobs.

jobs:
  # Linux: build in an AlmaLinux 8 container (glibc 2.28) with dnf's python3.11,
  # which — unlike manylinux's static /opt/python — ships a *shared* libpython that
  # PyInstaller needs. Runs on glibc >= 2.28 (Debian 10/11/12, Ubuntu 20.04+, RHEL 8+).
  # onedir (a folder, shipped as .tar.gz) launches instantly — no per-run unpacking.
  linux:
    runs-on: ubuntu-latest
    container: almalinux:8
    steps:
      - name: Install build toolchain
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            python3.11 python3.11-devel gcc make git tar gzip findutils

      - uses: actions/checkout@v4

      - name: Build engine + folder bundle (tar.gz)
        run: |
          python3.11 -m venv /tmp/venv      # dnf python3.11 -> shared libpython @ glibc 2.28
          . /tmp/venv/bin/activate
          python -m pip install --upgrade pip
          pip install pyyaml openai pyinstaller
          make CFLAGS="-DADVENT_AUTOSAVE -DADVENT_NO_EDITLINE" LIBS=
          pyinstaller --onedir --name cavebridge --noconfirm \
            --add-data "adventure.yaml:." \
            --add-binary "advent:." \
            --collect-all openai --paths . \
            packaging/cavebridge_entry.py
          mv dist/cavebridge dist/cavebridge-linux-x86_64
          mkdir -p out
          tar -C dist -czf out/cavebridge-linux-x86_64.tar.gz cavebridge-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: cavebridge-linux-x86_64
          path: out/*

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          append_body: false
          body: |
            Download the build for your platform.

            - **Linux / macOS** — extract the `.tar.gz`, then run the `cavebridge`
              binary inside from a terminal (see the README; on macOS clear the
              Gatekeeper quarantine first).
            - **Windows** — run the `.exe` (double-click or from PowerShell/cmd).

            On first launch CaveBridge asks for your LLM connection (or set the
            `OPENAI_*` env vars).

  # macOS (arm64): onedir -> .tar.gz, same as Linux.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build engine + folder bundle (tar.gz)
        run: |
          pip install pyyaml openai pyinstaller
          make CFLAGS="-DADVENT_AUTOSAVE -DADVENT_NO_EDITLINE" LIBS=
          pyinstaller --onedir --name cavebridge --noconfirm \
            --add-data "adventure.yaml:." \
            --add-binary "advent:." \
            --collect-all openai --paths . \
            packaging/cavebridge_entry.py
          mv dist/cavebridge dist/cavebridge-macos-arm64
          mkdir -p out
          tar -C dist -czf out/cavebridge-macos-arm64.tar.gz cavebridge-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: cavebridge-macos-arm64
          path: out/*
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          append_body: false
          body: |
            Download the build for your platform.

            - **Linux / macOS** — extract the `.tar.gz`, then run the `cavebridge`
              binary inside from a terminal (see the README; on macOS clear the
              Gatekeeper quarantine first).
            - **Windows** — run the `.exe` (double-click or from PowerShell/cmd).

            On first launch CaveBridge asks for your LLM connection (or set the
            `OPENAI_*` env vars).

  # Windows: a single double-clickable .exe (onefile). advent.exe via MSYS2/mingw-w64.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python deps (front-end + bundler)
        run: pip install pyyaml openai pyinstaller
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-yaml
      - name: Build engine (MSYS2)
        shell: msys2 {0}
        run: |
          make CFLAGS="-DADVENT_AUTOSAVE -DADVENT_NO_EDITLINE" LIBS=
          test -f advent.exe || cp advent advent.exe
      - name: Build one-file bundle
        shell: pwsh
        run: |
          pyinstaller --onefile --name cavebridge --noconfirm `
            --add-data "adventure.yaml;." `
            --add-binary "advent.exe;." `
            --collect-all openai --paths . `
            packaging/cavebridge_entry.py
          New-Item -ItemType Directory -Force out | Out-Null
          Copy-Item dist/cavebridge.exe out/cavebridge-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: cavebridge-windows-x86_64
          path: out/*
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          append_body: false
          body: |
            Download the build for your platform.

            - **Linux / macOS** — extract the `.tar.gz`, then run the `cavebridge`
              binary inside from a terminal (see the README; on macOS clear the
              Gatekeeper quarantine first).
            - **Windows** — run the `.exe` (double-click or from PowerShell/cmd).

            On first launch CaveBridge asks for your LLM connection (or set the
            `OPENAI_*` env vars).
